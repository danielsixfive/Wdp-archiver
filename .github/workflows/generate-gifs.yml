name: Generate GIFs

concurrency:
  group: generate-gifs
  cancel-in-progress: false

on:
  workflow_dispatch:

jobs:
  gifs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets

      - name: Install ImageMagick (if needed)
        run: |
          if ! command -v convert &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y imagemagick
          else
            echo "ImageMagick already installed."
          fi

      - name: Generate GIFs
        run: bash generate-gifs.sh
        env:
          FULL_REGEN: true   # use all snapshots, ignore time window

      - name: Commit and push GIFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.gif
          if ! git diff --cached --quiet; then
            git commit -m "Update GIFs"
            git pull --rebase origin assets
            git push origin assets
          else
            echo "No GIF changes"
          fi
