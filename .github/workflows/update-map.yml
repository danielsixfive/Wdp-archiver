name: Update Map Snapshot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout assets branch
        uses: actions/checkout@v4
        with:
          ref: assets
          fetch-depth: 0

      - name: Install ImageMagick
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Download and stitch tiles
        run: bash download-and-stitch.sh

      - name: Rename with timestamp
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d_%H%M%S')
          mv output.png "wdpsnapshot_${TIMESTAMP}.png"
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV

      - name: Commit new snapshot to assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wdpsnapshot_*.png
          if ! git diff --cached --quiet; then
            git commit -m "Snapshot ${TIMESTAMP} UTC"
            git push origin assets
          else
            echo "No changes to commit"
          fi

      - name: Generate GIFs (last 24h)
        run: bash generate-gifs.sh

      - name: Update snapshot list JSON
        run: |
          python3 << 'EOF'
          import glob, json
          files = sorted(glob.glob('wdpsnapshot_*.png'))
          with open('snapshots.json', 'w') as f:
              json.dump(files, f)
          EOF

      - name: Commit updated GIFs and snapshot list (always)
        run: |
          git add *.gif snapshots.json
          git commit --allow-empty -m "Auto-update cropped GIFs and snapshot list (24h)"
          git push origin assets
