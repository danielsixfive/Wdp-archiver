<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Instant Alpha Test</title></head>
<body style="margin:0; background:#000;">
  <canvas id="c"></canvas>
  <script>
    (async () => {
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');

      // Draw a checkerboard pattern (transparency will reveal this)
      const size = 20;
      canvas.width = 800; canvas.height = 600;
      for (let y = 0; y < canvas.height; y += size) {
        for (let x = 0; x < canvas.width; x += size) {
          ctx.fillStyle = ( (x/size + y/size) % 2 === 0 ) ? '#888' : '#ccc';
          ctx.fillRect(x, y, size, size);
        }
      }

      // Fetch the latest snapshot list from raw.githubusercontent.com (updates instantly)
      const res = await fetch('https://raw.githubusercontent.com/danielsixfive/Wdp-archiver/assets/snapshots.json');
      const snapshots = await res.json();
      if (!snapshots.length) return alert('No snapshots found');

      const latest = snapshots[snapshots.length - 1];
      const img = new Image();
      img.src = `https://raw.githubusercontent.com/danielsixfive/Wdp-archiver/assets/${latest}`;
      img.onload = () => {
        ctx.imageSmoothingEnabled = false;
        const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
        const x = (canvas.width - img.width * scale) / 2;
        const y = (canvas.height - img.height * scale) / 2;
        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
        console.log('Latest snapshot loaded: ' + latest);
      };
      img.onerror = () => alert('Failed to load: ' + latest);
    })();
  </script>
</body>
</html>
