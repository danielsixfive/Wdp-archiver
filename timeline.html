<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WDP timeline viewer</title>
  <style>
    * { box-sizing: border-box; }

    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
      color: white;
    }

    #canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
      cursor: grab;
    }
    #canvas:active {
      cursor: grabbing;
    }

    /* ---- Top banner: timestamp + download links ---- */
    #top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.75);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
      pointer-events: auto;
    }

    #timestamp-label-top {
      font-size: 1rem;
      font-weight: bold;
      text-align: center;
      flex: 1;
    }

    #download-group {
      display: flex;
      gap: 6px;
    }

    .dl-btn {
      font-size: 0.8rem;
      padding: 4px 8px;
      background: #444;
      color: white;
      border: 1px solid #888;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* ---- Bottom controls: slider + label ---- */
    #controls {
      position: absolute;
      bottom: 20px;
      left: 5%;
      right: 5%;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 8px;
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 20;
    }

    #slider-label {
      font-size: 0.85rem;
      opacity: 0.9;
      pointer-events: none;
    }

    #slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: #555;
      border-radius: 3px;
      outline: none;
    }

    #slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    @media (max-width: 500px) {
      #top-bar {
        flex-wrap: wrap;
        justify-content: center;
        gap: 6px;
      }
      #download-group {
        order: 1;
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="top-bar">
    <span id="timestamp-label-top">--</span>
    <div id="download-group">
      <button class="dl-btn" id="dl-planets">planets</button>
      <button class="dl-btn" id="dl-main">main</button>
      <button class="dl-btn" id="dl-far_east">far east</button>
      <button class="dl-btn" id="dl-test">test 500px</button>
    </div>
  </div>

  <div id="controls">
    <span id="slider-label">drag to move thru time</span>
    <input type="range" id="slider" min="0" max="0" value="0" step="1">
  </div>

<script>
  (function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('slider');
    const timestampLabelTop = document.getElementById('timestamp-label-top');
    const dlPlanets = document.getElementById('dl-planets');
    const dlMain = document.getElementById('dl-main');
    const dlFarEast = document.getElementById('dl-far_east');

    const dpr = window.devicePixelRatio || 1;
    ctx.imageSmoothingEnabled = false;

    // ---- Map / tile constants ----
    const ZOOM = 11;
    const TILE_SIZE = 1000;
    const TOTAL_TILES = Math.pow(2, ZOOM);        // 2048
    const WORLD_SIZE = TOTAL_TILES * TILE_SIZE;   // 2,048,000 px
    const START_COL = 1225, START_ROW = 513;      // our stitched area

    function worldYToLat(yPx) {
      const mercatorY = 1 - 2 * yPx / WORLD_SIZE;
      return (2 * Math.atan(Math.exp(Math.PI * mercatorY)) - Math.PI / 2) * 180 / Math.PI;
    }
    function worldXToLon(xPx) {
      return (xPx / WORLD_SIZE) * 360 - 180;
    }
    function pixelToLatLon(px, py) {
      const globalX = START_COL * TILE_SIZE + px;
      const globalY = START_ROW * TILE_SIZE + py;
      return { lat: worldYToLat(globalY), lon: worldXToLon(globalX) };
    }
    function cropToBounds(x, y, w, h) {
      const nw = pixelToLatLon(x, y);
      const se = pixelToLatLon(x + w, y + h);
      return { north: nw.lat, south: se.lat, west: nw.lon, east: se.lon };
    }

    // Crops (unchanged)
    const CROPS = {
      planets:  { x: 0,     y: 1360, w: 2511, h: 2100 },
      main:     { x: 2512,  y: 1298, w: 2488, h: 2900 },
      far_east: { x: 5000,  y: 2000, w: 2000, h: 2000 }
    };

    let snapshots = [];
    let currentImage = new Image();
    let currentIndex = -1, requestedIndex = -1;
    let offsetX = 0, offsetY = 0, scale = 1.0;
    const MIN_SCALE = 0.1, MAX_SCALE = 10.0;
    let dragging = false, dragStartX = 0, dragStartY = 0, dragOffsetX = 0, dragOffsetY = 0;
    let initialPinchDistance = 0, initialScale = 1.0, initialPinchCenter = { x: 0, y: 0 };

    function resize() {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      drawImage();
    }
    window.addEventListener('resize', resize);

    fetch('snapshots.json')
      .then(r => r.json())
      .then(files => {
        if (!files.length) { timestampLabelTop.textContent = 'No snapshots found.'; return; }
        snapshots = files;
        slider.max = files.length - 1;
        slider.value = files.length - 1;
        loadSnapshot(files.length - 1);
      })
      .catch(e => { timestampLabelTop.textContent = 'Failed to load snapshots.json'; console.error(e); });

    function loadSnapshot(index) {
      if (index < 0 || index >= snapshots.length) return;
      if (index === currentIndex) return;
      requestedIndex = index;
      slider.value = index;
      const filename = snapshots[index];
      const m = filename.match(/(\d{8})_(\d{6})/);
      timestampLabelTop.textContent = m
        ? `${m[1].slice(0,4)}-${m[1].slice(4,6)}-${m[1].slice(6,8)} ${m[2].slice(0,2)}:${m[2].slice(2,4)}:${m[2].slice(4,6)}`
        : filename;
      currentImage.src = snapshots[index];
    }

    currentImage.onload = () => {
      if (currentIndex !== requestedIndex) {
        if (currentIndex === -1) { currentIndex = requestedIndex; resetView(); }
        else { currentIndex = requestedIndex; drawImage(); }
      }
    };
    currentImage.onerror = () => console.error('Image failed:', currentImage.src);

    function resetView() {
      if (!currentImage.complete || currentImage.naturalWidth === 0) return;
      const w = currentImage.width, h = currentImage.height;
      const ww = window.innerWidth, wh = window.innerHeight;
      scale = Math.min(ww / w, wh / h);
      offsetX = (ww - w * scale) / 2;
      offsetY = (wh - h * scale) / 2;
      drawImage();
    }

    function drawImage() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Fill with wplace water color for transparent areas
  ctx.fillStyle = '#A0BDFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (!currentImage.complete || currentImage.naturalWidth === 0) return;

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);
  ctx.drawImage(currentImage, 0, 0);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
}

    // Pan & zoom events (unchanged)...
    canvas.addEventListener('mousedown', e => { e.preventDefault(); dragging = true; dragStartX = e.clientX; dragStartY = e.clientY; dragOffsetX = offsetX; dragOffsetY = offsetY; canvas.style.cursor = 'grabbing'; });
    window.addEventListener('mousemove', e => { if (!dragging) return; offsetX = dragOffsetX + (e.clientX - dragStartX); offsetY = dragOffsetY + (e.clientY - dragStartY); drawImage(); });
    window.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'grab'; });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches; if (t.length===1) { dragging=true; dragStartX=t[0].clientX; dragStartY=t[0].clientY; dragOffsetX=offsetX; dragOffsetY=offsetY; } else if (t.length===2) { dragging=false; const dx=t[1].clientX-t[0].clientX, dy=t[1].clientY-t[0].clientY; initialPinchDistance=Math.hypot(dx,dy); initialScale=scale; initialPinchCenter={x:(t[0].clientX+t[1].clientX)/2, y:(t[0].clientY+t[1].clientY)/2}; } }, {passive:false});
    canvas.addEventListener('touchmove', e => { e.preventDefault(); const t=e.touches; if (t.length===1 && dragging) { offsetX=dragOffsetX+(t[0].clientX-dragStartX); offsetY=dragOffsetY+(t[0].clientY-dragStartY); drawImage(); } else if (t.length===2) { const dx=t[1].clientX-t[0].clientX, dy=t[1].clientY-t[0].clientY; const nd=Math.hypot(dx,dy); if(initialPinchDistance>0){ const ns=initialScale*(nd/initialPinchDistance); scale=Math.max(MIN_SCALE,Math.min(MAX_SCALE,ns)); const cx=(t[0].clientX+t[1].clientX)/2, cy=(t[0].clientY+t[1].clientY)/2; const sc=scale/initialScale; offsetX=cx-sc*(initialPinchCenter.x-offsetX); offsetY=cy-sc*(initialPinchCenter.y-offsetY); initialPinchCenter={x:cx,y:cy}; initialScale=scale; initialPinchDistance=nd; drawImage(); } } }, {passive:false});
    canvas.addEventListener('touchend', () => { dragging=false; initialPinchDistance=0; });
    canvas.addEventListener('wheel', e => { e.preventDefault(); const zf=1.1, old=scale; if(e.deltaY<0) scale*=zf; else scale/=zf; scale=Math.max(MIN_SCALE,Math.min(MAX_SCALE,scale)); const sc=scale/old; offsetX=e.clientX-sc*(e.clientX-offsetX); offsetY=e.clientY-sc*(e.clientY-offsetY); drawImage(); }, {passive:false});

    slider.addEventListener('input', () => loadSnapshot(parseInt(slider.value,10)));
    window.addEventListener('keydown', e => {
      if(e.key==='ArrowLeft'){ e.preventDefault(); if(currentIndex>0) loadSnapshot(currentIndex-1); }
      else if(e.key==='ArrowRight'){ e.preventDefault(); if(currentIndex<snapshots.length-1) loadSnapshot(currentIndex+1); }
      else if(e.key==='r'||e.key==='R') resetView();
    });

function downloadOverlay(cropKey) {
  if (!currentImage.complete || currentImage.naturalWidth === 0) return;
  const crop = CROPS[cropKey];
  if (!crop) return;

  // ---- Canvas with water-color background ----
  const tmp = document.createElement('canvas');
  tmp.width = crop.w;
  tmp.height = crop.h;
  const tctx = tmp.getContext('2d');

  // Fill with wplace ocean water color
  tctx.fillStyle = '#A0BDFF';
  tctx.fillRect(0, 0, crop.w, crop.h);

  // Draw cropped image on top (transparent areas will show the water fill)
  tctx.drawImage(currentImage, crop.x, crop.y, crop.w, crop.h, 0, 0, crop.w, crop.h);

  // Export as opaque PNG
  const dataUrl = tmp.toDataURL('image/png');

  // Build overlay JSON
  const bounds = cropToBounds(crop.x, crop.y, crop.w, crop.h);
  const m = snapshots[currentIndex].match(/(\d{8}_\d{6})/);
  const ts = m ? m[0] : Date.now();

  const overlay = {
    id: `wdp_${cropKey}_${ts}`,
    schemaVersion: "1",
    name: `${cropKey}_${ts}.png`,
    opacity: 1,
    image: { dataUrl, width: crop.w, height: crop.h },
    bounds,
    colorMetric: "lab",
    dithering: false,
    order: 0,
    locked: false,
    hasPlaced: true,
    visible: true
  };

  const blob = new Blob([JSON.stringify(overlay)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wdp_${cropKey}_${ts}.wplace`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
    dlPlanets.addEventListener('click', () => downloadOverlay('planets'));
    dlMain.addEventListener('click', () => downloadOverlay('main'));
    dlFarEast.addEventListener('click', () => downloadOverlay('far_east'));

//delete this later
document.getElementById('dl-test').addEventListener('click', () => {
  const testCrop = { x: 0, y: 0, w: 500, h: 500 };
  // Use a fresh canvas with transparency (no water fill)
  const tmp = document.createElement('canvas');
  tmp.width = 500; tmp.height = 500;
  const tctx = tmp.getContext('2d');
  tctx.clearRect(0, 0, 500, 500);
  tctx.drawImage(currentImage, 0, 0, 500, 500, 0, 0, 500, 500);
  const dataUrl = tmp.toDataURL('image/png');
  const bounds = cropToBounds(0, 0, 500, 500);
  const m = snapshots[currentIndex].match(/(\d{8}_\d{6})/);
  const ts = m ? m[0] : Date.now();
  const overlay = {
    id: `wdp_test_${ts}`,
    schemaVersion: "1",
    name: `test_${ts}.png`,
    opacity: 1,
    image: { dataUrl, width: 500, height: 500 },
    bounds,
    colorMetric: "lab",
    dithering: false,
    order: 0,
    locked: false,
    hasPlaced: true,
    visible: true
  };
  const blob = new Blob([JSON.stringify(overlay)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `wdp_test_${ts}.wplace`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
});
    
    resize();
  })();
</script>
</body>
</html>
