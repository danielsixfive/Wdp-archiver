<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>wplace.live Timeline Viewer</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }
    #canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;          /* prevents browser gestures on canvas */
      cursor: grab;
    }
    #canvas:active {
      cursor: grabbing;
    }
    #controls {
      position: absolute;
      bottom: 20px;
      left: 5%;
      right: 5%;
      background: rgba(0,0,0,0.75);
      border-radius: 8px;
      padding: 10px 16px;
      color: white;
      display: flex;
      align-items: center;
      gap: 10px;
      box-sizing: border-box;
    }
    #slider {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      background: #555;
      border-radius: 3px;
      outline: none;
    }
    #slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    #timestamp-label {
      font-size: 0.9rem;
      min-width: 140px;
      text-align: right;
      white-space: nowrap;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 0.8rem;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="info">Loading snapshots…</div>
  <div id="controls">
    <span style="white-space:nowrap; font-size:0.9rem;">drag to move thru time</span>
    <input type="range" id="slider" min="0" max="0" value="0" step="1">
    <span id="timestamp-label"></span>
  </div>
<script>
  (function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const slider = document.getElementById('slider');
    const label = document.getElementById('timestamp-label');
    const info = document.getElementById('info');

    const dpr = window.devicePixelRatio || 1;
    ctx.imageSmoothingEnabled = false;

    let snapshots = [];
    let currentImage = new Image();
    let currentIndex = -1;
    let requestedIndex = -1;

    // View transform – in CSS pixels
    let offsetX = 0, offsetY = 0;
    let scale = 1.0;
    const MIN_SCALE = 0.1;
    const MAX_SCALE = 10.0;

    // Pan state
    let dragging = false;
    let dragStartX = 0, dragStartY = 0;
    let dragOffsetX = 0, dragOffsetY = 0;

    // Pinch zoom
    let initialPinchDistance = 0;
    let initialScale = 1.0;
    let initialPinchCenter = { x: 0, y: 0 };

    // Offscreen canvas for crisp pixel source
    let offscreen = null;
    let offscreenCtx = null;

    // ---- Resize (high‑DPI) ----
    function resize() {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      canvas.style.width = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      drawImage();
    }
    window.addEventListener('resize', resize);

    // ---- Load snapshot list ----
    fetch('snapshots.json')
      .then(r => r.json())
      .then(files => {
        if (!files.length) {
          info.textContent = 'No snapshots found.';
          return;
        }
        snapshots = files;
        slider.max = files.length - 1;
        slider.value = files.length - 1;
        info.textContent = `${files.length} snapshots loaded.`;
        loadSnapshot(files.length - 1);
      })
      .catch(e => {
        info.textContent = 'Failed to load snapshots.json';
        console.error(e);
      });

    // ---- Image loading ----
    function loadSnapshot(index) {
      if (index < 0 || index >= snapshots.length) return;
      if (index === currentIndex) return;

      requestedIndex = index;

      slider.value = index;
      const filename = snapshots[index];
      const match = filename.match(/(\d{8})_(\d{6})/);
      if (match) {
        const date = match[1];
        const time = match[2];
        label.textContent = `${date.slice(0,4)}-${date.slice(4,6)}-${date.slice(6,8)} ${time.slice(0,2)}:${time.slice(2,4)}:${time.slice(4,6)}`;
      } else {
        label.textContent = filename;
      }

      currentImage.src = snapshots[index];
    }

    currentImage.onload = () => {
      if (currentIndex !== requestedIndex) {
        // First load
        if (currentIndex === -1) {
          currentIndex = requestedIndex;
          createOffscreen();
          resetView();
        } else {
          currentIndex = requestedIndex;
          createOffscreen();
          drawImage();
        }
      }
    };

    currentImage.onerror = () => {
      console.error('Failed to load image:', currentImage.src);
    };

    // Create an offscreen canvas at the image’s native resolution
    function createOffscreen() {
      if (!currentImage.complete || currentImage.naturalWidth === 0) return;
      const w = currentImage.width;
      const h = currentImage.height;
      offscreen = document.createElement('canvas');
      offscreen.width = w;
      offscreen.height = h;
      offscreenCtx = offscreen.getContext('2d');
      offscreenCtx.imageSmoothingEnabled = false;
      offscreenCtx.drawImage(currentImage, 0, 0);
    }

    // ---- Drawing ----
    function resetView() {
      if (!offscreen) return;
      const imgW = offscreen.width;
      const imgH = offscreen.height;
      const winW = window.innerWidth;
      const winH = window.innerHeight;
      scale = Math.min(winW / imgW, winH / imgH);
      offsetX = (winW - imgW * scale) / 2;
      offsetY = (winH - imgH * scale) / 2;
      drawImage();
    }

    function drawImage() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!offscreen) return;

      // Map CSS pixels to physical pixels perfectly
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // Apply pan & zoom
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);
      // Draw the offscreen canvas (crisp, no smoothing)
      ctx.drawImage(offscreen, 0, 0);
      // Reset transform for next frame
      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }

    // ---- Mouse events ----
    canvas.addEventListener('mousedown', (e) => {
      e.preventDefault();
      dragging = true;
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      dragOffsetX = offsetX;
      dragOffsetY = offsetY;
      canvas.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      offsetX = dragOffsetX + dx;
      offsetY = dragOffsetY + dy;
      drawImage();
    });

    window.addEventListener('mouseup', () => {
      dragging = false;
      canvas.style.cursor = 'grab';
    });

    // ---- Touch events ----
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const touches = e.touches;
      if (touches.length === 1) {
        dragging = true;
        dragStartX = touches[0].clientX;
        dragStartY = touches[0].clientY;
        dragOffsetX = offsetX;
        dragOffsetY = offsetY;
      } else if (touches.length === 2) {
        dragging = false;
        const dx = touches[1].clientX - touches[0].clientX;
        const dy = touches[1].clientY - touches[0].clientY;
        initialPinchDistance = Math.hypot(dx, dy);
        initialScale = scale;
        initialPinchCenter.x = (touches[0].clientX + touches[1].clientX) / 2;
        initialPinchCenter.y = (touches[0].clientY + touches[1].clientY) / 2;
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const touches = e.touches;
      if (touches.length === 1 && dragging) {
        const dx = touches[0].clientX - dragStartX;
        const dy = touches[0].clientY - dragStartY;
        offsetX = dragOffsetX + dx;
        offsetY = dragOffsetY + dy;
        drawImage();
      } else if (touches.length === 2) {
        const dx = touches[1].clientX - touches[0].clientX;
        const dy = touches[1].clientY - touches[0].clientY;
        const newDist = Math.hypot(dx, dy);
        if (initialPinchDistance > 0) {
          const newScale = initialScale * (newDist / initialPinchDistance);
          scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
          const centerX = (touches[0].clientX + touches[1].clientX) / 2;
          const centerY = (touches[0].clientY + touches[1].clientY) / 2;
          const scaleChange = scale / initialScale;
          offsetX = centerX - scaleChange * (initialPinchCenter.x - offsetX);
          offsetY = centerY - scaleChange * (initialPinchCenter.y - offsetY);
          initialPinchCenter.x = centerX;
          initialPinchCenter.y = centerY;
          initialScale = scale;
          initialPinchDistance = newDist;
          drawImage();
        }
      }
    }, { passive: false });

    canvas.addEventListener('touchend', () => {
      dragging = false;
      initialPinchDistance = 0;
    });

    // ---- Wheel zoom ----
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const zoomFactor = 1.1;
      const oldScale = scale;
      if (e.deltaY < 0) {
        scale *= zoomFactor;
      } else {
        scale /= zoomFactor;
      }
      scale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale));
      const mouseX = e.clientX;
      const mouseY = e.clientY;
      const scaleChange = scale / oldScale;
      offsetX = mouseX - scaleChange * (mouseX - offsetX);
      offsetY = mouseY - scaleChange * (mouseY - offsetY);
      drawImage();
    }, { passive: false });

    // ---- Slider ----
    slider.addEventListener('input', () => {
      const idx = parseInt(slider.value, 10);
      loadSnapshot(idx);
    });

    // ---- Keyboard ----
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        if (currentIndex > 0) loadSnapshot(currentIndex - 1);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        if (currentIndex < snapshots.length - 1) loadSnapshot(currentIndex + 1);
      } else if (e.key === 'r' || e.key === 'R') {
        resetView();
      }
    });

    resize();
  })();
</script>
</body>
</html>
